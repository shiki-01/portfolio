services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio
    working_dir: /app
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    tty: true
